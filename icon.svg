<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="79" fill="none" stroke="url(#g2)" stroke-width="3"/>
  <!-- C letter -->
  <text x="256" y="340" font-family="Arial Black, Arial" font-weight="900" font-size="320" fill="url(#g1)" text-anchor="middle">C</text>
  <!-- Bottom label -->
  <text x="256" y="460" font-family="Arial" font-weight="700" font-size="52" fill="#4a5568" text-anchor="middle" letter-spacing="12">BETTING</text>
  <!-- Decorative dots -->
  <circle cx="120" cy="120" r="6" fill="#00d4ff" opacity="0.4"/>
  <circle cx="392" cy="120" r="6" fill="#f5a623" opacity="0.4"/>
  <circle cx="120" cy="392" r="4" fill="#7ed321" opacity="0.3"/>
  <circle cx="392" cy="392" r="4" fill="#00d4ff" opacity="0.3"/>
</svg>
