<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#00d4ff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CBetting"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon.svg"/>
<title>Consensus Betting</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0d14;--sf:#0f1520;--s2:#1a1f2e;--s3:#252d3d;
  --bd:#1e2d40;--tx:#e2e8f0;--mu:#94a3b8;--dm:#4a5568;--dr:#2d3748;
  --cy:#00d4ff;--bl:#0080ff;--or:#f5a623;--gn:#22c55e;--rd:#ef4444;--lm:#7ed321;
  --fd:'Barlow Condensed',sans-serif;
  --fu:'Rajdhani',sans-serif;
  --fb:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 15% 40%,rgba(0,212,255,.04),transparent 70%),
  radial-gradient(ellipse 50% 60% at 85% 20%,rgba(245,166,35,.03),transparent 70%),
  linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,40px 40px,40px 40px;}
#app{position:relative;z-index:1;}
.fd{font-family:var(--fd);}
.fu{font-family:var(--fu);}
.lbl{font-family:var(--fu);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--dm);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%,100%{opacity:.35;}50%{opacity:.75;}}
.fu_{animation:fadeUp .4s ease both;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10;}
.tb{flex:1;padding:13px 4px;border:none;background:transparent;color:var(--dm);cursor:pointer;font-family:var(--fu);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
.tb.on{color:var(--cy);border-bottom-color:var(--cy);}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:18px;transition:border-color .3s;}
.card.dc{border-color:rgba(0,212,255,.4);}
.card.do{border-color:rgba(245,166,35,.4);}
.card.dl{border-color:rgba(126,211,33,.4);}
.btn{font-family:var(--fu);font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;border-radius:7px;transition:opacity .2s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.bp{background:linear-gradient(135deg,var(--cy),var(--bl));color:#000;font-size:13px;padding:13px;width:100%;}
.bs{font-size:11px;padding:7px 16px;border:1px solid;}
input{font-family:var(--fb);background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:7px;padding:10px 14px;font-size:14px;outline:none;transition:border-color .2s;width:100%;}
input:focus{border-color:var(--cy);}
input[type=password]{letter-spacing:2px;}
input[type=password]::placeholder{letter-spacing:0;}
.pill{font-family:var(--fu);font-size:11px;font-weight:600;padding:5px 12px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--dm);cursor:pointer;transition:all .2s;}
.pill.ac{border-color:var(--cy);background:rgba(0,212,255,.1);color:var(--cy);}
.pill.ao{border-color:var(--or);background:rgba(245,166,35,.1);color:var(--or);}
.pt{background:var(--s2);border-radius:4px;height:6px;overflow:hidden;}
.pf{height:100%;border-radius:4px;transition:width 1.1s ease;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--s3);color:var(--tx);font-family:var(--fu);font-size:12px;padding:9px 20px;border-radius:30px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
.pc{padding:18px 14px 90px;max-width:1100px;margin:0 auto;}
.hist-item{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px;}
.badge{display:inline-block;font-family:var(--fu);font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:1px;}
.bw{background:rgba(34,197,94,.15);color:var(--gn);border:1px solid rgba(34,197,94,.3);}
.bl_{background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.3);}
.bp_{background:rgba(245,166,35,.15);color:var(--or);border:1px solid rgba(245,166,35,.3);}
.sb{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;text-align:center;}
.sn{font-family:var(--fd);font-size:32px;font-weight:900;line-height:1;}
@media(max-width:600px){.ag{grid-template-columns:1fr!important;}}
</style>
</head>
<body>
<div id="app">
  <header style="text-align:center;padding:22px 16px 12px;">
    <div class="lbl" style="color:var(--cy);margin-bottom:5px;letter-spacing:5px;">Multi-Agent Sports Intelligence</div>
    <h1 class="fd" style="font-size:clamp(26px,6vw,48px);font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--cy) 50%,var(--or) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;line-height:1.1;">CONSENSUS BETTING</h1>
    <div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-top:6px;">
      <div class="lbl" style="letter-spacing:3px;">Groq · Gemini · SerpAPI · 100% Gratis</div>
      <button id="btn-install-header" class="btn bs fu" onclick="triggerInstall()"
        style="display:none;border-color:var(--cy);color:var(--cy);font-size:10px;padding:4px 10px;">
        📲 Instalar
      </button>
    </div>
  </header>
  <nav class="tabs">
    <button class="tb on" onclick="switchTab('analyze',this)">⚡ Analizar</button>
    <button class="tb"    onclick="switchTab('history',this)">📋 Historial</button>
    <button class="tb"    onclick="switchTab('stats',this)">📊 Stats</button>
    <button class="tb"    onclick="switchTab('config',this)">⚙️ Config</button>
  </nav>
  <div class="pc">
    <div id="tab-analyze"></div>
    <div id="tab-history" style="display:none;"></div>
    <div id="tab-stats"   style="display:none;"></div>
    <div id="tab-config"  style="display:none;"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ─────────────────────────────────────────
// CONFIG — cargado desde localStorage
// ─────────────────────────────────────────
const CFG = {
  get GROQ()   { return localStorage.getItem("cb_groq")   || ""; },
  get GEMINI() { return localStorage.getItem("cb_gemini") || ""; },
  get SERP()   { return localStorage.getItem("cb_serp")   || ""; },
};

// ─────────────────────────────────────────
// DATOS
// ─────────────────────────────────────────
const SPORTS = [
  {id:"nba",         emoji:"🏀",label:"NBA",             markets:["Ganador partido","Over/Under total","Spread/Hándicap","Player props"]},
  {id:"pl",          emoji:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",label:"Premier League",  markets:["1X2","Ambos marcan","Total goles","Asian handicap"]},
  {id:"laliga",      emoji:"🇪🇸",label:"LaLiga",          markets:["1X2","Ambos marcan","Total goles","Asian handicap"]},
  {id:"champions",   emoji:"⭐",label:"Champions",        markets:["1X2","Ambos marcan","Total goles","Hándicap europeo"]},
  {id:"libertadores",emoji:"🌎",label:"Libertadores",     markets:["1X2","Ambos marcan","Total goles"]},
  {id:"sudamericana",emoji:"🏆",label:"Sudamericana",     markets:["1X2","Ambos marcan","Total goles"]},
  {id:"ligabetplay", emoji:"🇨🇴",label:"Liga BetPlay",    markets:["1X2","Ambos marcan","Total goles"]},
];

// 3 AGENTES — todos sobre Groq (gratis), modelos distintos, roles distintos
const AGENTS = [
  {id:"stats",   name:"Agente Estadístico", model:"Llama-3.3-70b",       icon:"📊",color:"#00d4ff",desc:"Forma · H2H · Rendimiento"},
  {id:"market",  name:"Agente de Mercado",  model:"Gemini 1.5 Flash",    icon:"💹",color:"#f5a623",desc:"Cuotas · Líneas · Valor +EV"},
  {id:"context", name:"Agente Contextual",  model:"Llama-3.1-8b-instant",icon:"🧠",color:"#7ed321",desc:"Lesiones · Motivación · Noticias"},
];

const SCHEMA = `{"pick":"[selección concreta]","probability":72,"confidence":7,"reasoning":"[2-3 oraciones de análisis]","key_factors":["f1","f2","f3"],"warning":null}`;

const SYS = {
  stats:`Eres un analista deportivo élite. Analiza SOLO estadísticas: forma reciente (últimos 5-10 partidos), H2H histórico, rendimiento local/visitante, posición en tabla, promedios de goles/puntos. Sé preciso. Termina SIEMPRE con <answer>${SCHEMA}</answer> — JSON válido, probability y confidence son números enteros, warning es null o texto.`,
  market:`Eres especialista en mercados de apuestas y valor esperado (+EV). Analiza SOLO: cuotas estimadas, probabilidad implícita, si hay valor real, movimiento de línea, señales de sharp vs public money. Termina SIEMPRE con <answer>${SCHEMA}</answer> — JSON válido, probability y confidence son números enteros, warning es null o texto.`,
  context:`Eres analista de contexto deportivo. Analiza SOLO: lesiones/dudas, suspensiones, motivación de cada equipo, días de descanso/fatiga, presión de afición, noticias recientes. Termina SIEMPRE con <answer>${SCHEMA}</answer> — JSON válido, probability y confidence son números enteros, warning es null o texto.`
};

// ─────────────────────────────────────────
// ESTADO
// ─────────────────────────────────────────
const S = {
  sport:   SPORTS[0],
  market:  SPORTS[0].markets[0],
  match:   "",
  loading: false,
  status:  ["idle","idle","idle"],
  results: [null,null,null],
  errors:  [null,null,null],
  consensus: null,
  currentId: null,
  history: JSON.parse(localStorage.getItem("cb_hist")||"[]"),
  tab: "analyze",
};
const saveHist = () => localStorage.setItem("cb_hist", JSON.stringify(S.history));

// ─────────────────────────────────────────
// FETCH CON TIMEOUT (15s)
// ─────────────────────────────────────────
async function fetchT(url, opts, ms=15000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, {...opts, signal: ctrl.signal});
    return r;
  } finally {
    clearTimeout(timer);
  }
}

// ─────────────────────────────────────────
// SERP — búsqueda web (SerpAPI gratis)
// ─────────────────────────────────────────
async function serpSearch(query) {
  if (!CFG.SERP) return "";
  try {
    const r = await fetchT(
      `https://serpapi.com/search.json?q=${encodeURIComponent(query)}&hl=es&num=5&api_key=${CFG.SERP}`, {}
    );
    const d = await r.json();
    return (d.organic_results||[]).slice(0,5).map(x=>`• ${x.title}: ${x.snippet}`).join("\n");
  } catch { return ""; }
}

// ─────────────────────────────────────────
// AGENTE 1 — Groq Llama-3.3-70b (Estadístico)
// ─────────────────────────────────────────
async function callStats(match, sport, market) {
  if (!CFG.GROQ) throw new Error("Sin Groq API key");
  const ctx = await serpSearch(`${match} estadísticas forma reciente ${sport} 2025`);
  const r = await fetchT("https://api.groq.com/openai/v1/chat/completions", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${CFG.GROQ}`},
    body:JSON.stringify({
      model:"llama-3.3-70b-versatile",
      max_tokens:800, temperature:0.25,
      messages:[
        {role:"system", content:SYS.stats},
        {role:"user",   content:`Partido: ${match}\nDeporte: ${sport}\nMercado: ${market}\n\nDatos web:\n${ctx||"(sin datos, usa tu conocimiento)"}\n\nAnaliza y termina con <answer>{...}</answer>`}
      ]
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return parseResp(d.choices[0].message.content);
}

// ─────────────────────────────────────────
// AGENTE 2 — Gemini 1.5 Flash (Mercado)
// ─────────────────────────────────────────
async function callMarket(match, sport, market) {
  if (!CFG.GEMINI) throw new Error("Sin Gemini API key");
  const ctx = await serpSearch(`${match} cuotas apuestas odds ${market} 2025`);
  const prompt = `${SYS.market}\n\nPartido: ${match}\nDeporte: ${sport}\nMercado: ${market}\n\nDatos web:\n${ctx||"(sin datos, estima con contexto)"}\n\nAnaliza y termina con <answer>{...}</answer>`;
  const r = await fetchT(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CFG.GEMINI}`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.25,maxOutputTokens:800}})
    }
  );
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return parseResp(d.candidates?.[0]?.content?.parts?.[0]?.text||"");
}

// ─────────────────────────────────────────
// AGENTE 3 — Groq Llama-3.1-8b (Contextual)
// ─────────────────────────────────────────
async function callContext(match, sport, market) {
  if (!CFG.GROQ) throw new Error("Sin Groq API key");
  const ctx = await serpSearch(`${match} lesiones noticias alineación ${new Date().getFullYear()}`);
  const r = await fetchT("https://api.groq.com/openai/v1/chat/completions", {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${CFG.GROQ}`},
    body:JSON.stringify({
      model:"llama-3.1-8b-instant",
      max_tokens:800, temperature:0.25,
      messages:[
        {role:"system", content:SYS.context},
        {role:"user",   content:`Partido: ${match}\nDeporte: ${sport}\nMercado: ${market}\n\nNoticias recientes:\n${ctx||"(sin datos, analiza con tu conocimiento)"}\n\nAnaliza y termina con <answer>{...}</answer>`}
      ]
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return parseResp(d.choices[0].message.content);
}

// ─────────────────────────────────────────
// PARSER
// ─────────────────────────────────────────
function parseResp(text) {
  const m1 = text.match(/<answer>([\s\S]*?)<\/answer>/i);
  if (m1) { const o=JSON.parse(m1[1].replace(/```json|```/g,"").trim()); if(o.warning==="null")o.warning=null; return o; }
  const m2 = text.match(/\{[\s\S]*?"pick"[\s\S]*?\}/);
  if (m2) { const o=JSON.parse(m2[0]); if(o.warning==="null")o.warning=null; return o; }
  throw new Error(`Sin JSON. Respuesta: "${text.slice(0,80)}..."`);
}

// ─────────────────────────────────────────
// CONSENSO
// ─────────────────────────────────────────
function calcConsensus(valid) {
  const picks = valid.map(r=>r.pick.toLowerCase().trim());
  const probs  = valid.map(r=>+r.probability);
  const confs  = valid.map(r=>+r.confidence);
  // Agrupar picks similares por primera palabra
  const groups={};
  picks.forEach((p,i)=>{
    const key = picks.findIndex(q=>q.split(" ")[0]===p.split(" ")[0]||p.includes(q.split(" ")[0])||q.includes(p.split(" ")[0]));
    const gk  = picks[key];
    if(!groups[gk])groups[gk]=[];
    groups[gk].push(i);
  });
  const top    = Object.entries(groups).sort((a,b)=>b[1].length-a[1].length)[0];
  const idxs   = top[1];
  const pick   = valid[idxs[0]].pick;
  const agree  = idxs.length;
  const avgP   = Math.round(probs.reduce((a,b)=>a+b,0)/probs.length);
  const avgC   = +(confs.reduce((a,b)=>a+b,0)/confs.length).toFixed(1);
  const str    = agree===valid.length?100:agree>=2?66:33;
  let verdict,color;
  if(str===100&&avgC>=7){verdict="PICK FUERTE ✅";color="#22c55e";}
  else if(str>=66&&avgC>=5.5){verdict="PICK MODERADO ⚡";color="#f5a623";}
  else{verdict="EVITAR ⛔";color="#ef4444";}
  return {pick,avgP,avgC,str,agree,verdict,color,total:valid.length};
}

// ─────────────────────────────────────────
// ANÁLISIS PRINCIPAL
// ─────────────────────────────────────────
async function runAnalysis() {
  if(!S.match.trim()||S.loading)return;
  if(!CFG.GROQ&&!CFG.GEMINI){toast("⚙️ Configura al menos Groq o Gemini en Config");return;}
  S.loading=true; S.status=["loading","loading","loading"];
  S.results=[null,null,null]; S.errors=[null,null,null]; S.consensus=null; S.currentId=null;
  renderAnalyze();

  const callers = [callStats, callMarket, callContext];
  const promises = callers.map((fn,i)=>
    fn(S.match, S.sport.label, S.market)
      .then(r=>{ S.results[i]=r; S.status[i]="done"; renderAgentCard(i); return r; })
      .catch(e=>{ S.errors[i]=e.message; S.status[i]="error"; renderAgentCard(i); return null; })
  );

  const all   = await Promise.all(promises);
  const valid = all.filter(Boolean);

  if(valid.length>=2){
    S.consensus = calcConsensus(valid);
    const entry = {id:Date.now(),date:new Date().toISOString(),match:S.match,sport:S.sport.label,market:S.market,consensus:S.consensus,outcome:null};
    S.history.unshift(entry); if(S.history.length>100)S.history.pop(); saveHist(); S.currentId=entry.id;
  } else { toast("❌ Menos de 2 agentes respondieron — revisa tus keys"); }

  S.loading=false; renderAnalyze();
}

function setOutcome(id,outcome){
  const e=S.history.find(x=>x.id===id); if(!e)return;
  e.outcome=outcome; e.correct=outcome==="win"; saveHist();
  renderAnalyze(); renderHistory(); renderStats();
  toast(outcome==="win"?"✅ Marcado como acertado":"❌ Marcado como fallado");
}

// ─────────────────────────────────────────
// HELPERS UI
// ─────────────────────────────────────────
function toast(msg,dur=2800){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),dur);
}
function confBar(val){
  const pct=(val/10)*100;
  const c=pct>69?"var(--gn)":pct>49?"var(--or)":"var(--rd)";
  return `<div style="background:var(--s2);border-radius:3px;height:4px;margin-top:5px;overflow:hidden;"><div style="height:100%;border-radius:3px;width:${pct}%;background:${c};transition:width 1s;"></div></div>`;
}
function progBar(pct,color){
  return `<div class="pt"><div class="pf" style="width:${pct}%;background:${color};box-shadow:0 0 8px ${color}55;"></div></div>`;
}

// ─────────────────────────────────────────
// RENDER — ANALIZAR
// ─────────────────────────────────────────
function renderAnalyze(){
  document.getElementById("tab-analyze").innerHTML=`
    <div class="card" style="max-width:700px;margin:0 auto 18px;">
      <div class="lbl" style="margin-bottom:8px;">Deporte</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
        ${SPORTS.map(s=>`<button class="pill ${S.sport.id===s.id?"ac":""}" onclick="selSport('${s.id}')">${s.emoji} ${s.label}</button>`).join("")}
      </div>
      <div class="lbl" style="margin-bottom:8px;">Mercado</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
        ${S.sport.markets.map(m=>`<button class="pill ${S.market===m?"ao":""}" onclick="selMarket(this)" data-m="${m}">${m}</button>`).join("")}
      </div>
      <div class="lbl" style="margin-bottom:8px;">Partido</div>
      <input id="inp-m" type="text" placeholder="${S.sport.id==="nba"?"ej: Lakers vs Warriors":"ej: Real Madrid vs Barcelona"}"
        value="${S.match}" oninput="S.match=this.value" onkeydown="if(event.key==='Enter')runAnalysis()" style="margin-bottom:14px;"/>
      <button class="btn bp" onclick="runAnalysis()" ${S.loading||!S.match.trim()?"disabled":""}>
        ${S.loading?"⟳ &nbsp;ANALIZANDO...":"▶ &nbsp;LANZAR 3 AGENTES"}
      </button>
    </div>
    <div class="ag" style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:1100px;margin:0 auto 18px;">
      ${AGENTS.map((_,i)=>`<div id="ac${i}"></div>`).join("")}
    </div>
    <div id="cp" style="max-width:700px;margin:0 auto;"></div>`;
  AGENTS.forEach((_,i)=>renderAgentCard(i));
  if(S.consensus)renderConsensus();
  // mantener foco en el input si estaba escribiendo
  if(!S.loading){ const inp=document.getElementById("inp-m"); if(inp&&document.activeElement!==inp&&S.match)inp.focus(); }
}
function selSport(id){ S.sport=SPORTS.find(s=>s.id===id); S.market=S.sport.markets[0]; renderAnalyze(); }
function selMarket(btn){ S.market=btn.dataset.m; renderAnalyze(); }

// ─────────────────────────────────────────
// RENDER — TARJETA AGENTE
// ─────────────────────────────────────────
function renderAgentCard(i){
  const a=AGENTS[i],st=S.status[i],res=S.results[i],err=S.errors[i];
  const el=document.getElementById(`ac${i}`); if(!el)return;
  const glows=["dc","do","dl"];
  const glow=st==="done"?glows[i]:"";
  const stLabel={
    idle:`<span class="lbl">Standby</span>`,
    loading:`<span class="lbl" style="color:${a.color};">...</span>`,
    done:`<span class="lbl" style="color:var(--gn);">✓ Listo</span>`,
    error:`<span class="lbl" style="color:var(--rd);">✗ Error</span>`,
  }[st];
  const skel=(st==="loading"&&!res)?`<div style="opacity:.4;">${[80,60,92,55].map(w=>`<div style="height:9px;border-radius:3px;margin-bottom:10px;width:${w}%;background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.6s ease infinite;"></div>`).join("")}</div>`:"";
  const errB=err?`<div style="font-size:11px;color:var(--rd);padding:9px;background:rgba(239,68,68,.08);border-radius:6px;border:1px solid rgba(239,68,68,.2);word-break:break-all;">✗ ${err}</div>`:"";
  const resB=res?`<div class="fu_">
    <div style="background:${a.color}12;border:1px solid ${a.color}35;border-radius:7px;padding:9px 13px;margin-bottom:12px;">
      <div class="lbl" style="margin-bottom:4px;">Pick</div>
      <div class="fd" style="font-size:15px;font-weight:700;color:${a.color};">${res.pick}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
      <div style="background:var(--s2);border-radius:7px;padding:9px;">
        <div class="lbl" style="margin-bottom:3px;">Prob.</div>
        <div class="fd" style="font-size:24px;font-weight:900;">${res.probability}<span style="font-size:12px;font-family:var(--fb);font-weight:400;">%</span></div>
      </div>
      <div style="background:var(--s2);border-radius:7px;padding:9px;">
        <div class="lbl" style="margin-bottom:3px;">Confianza</div>
        <div class="fd" style="font-size:24px;font-weight:900;">${res.confidence}<span style="font-size:12px;font-family:var(--fb);font-weight:400;">/10</span></div>
        ${confBar(res.confidence)}
      </div>
    </div>
    <div style="font-size:12px;color:var(--mu);line-height:1.65;margin-bottom:10px;">${res.reasoning}</div>
    ${res.key_factors?.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;">${res.key_factors.map(f=>`<span class="fu" style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;background:var(--s2);color:var(--dm);border:1px solid var(--s3);">${f}</span>`).join("")}</div>`:""}
    ${res.warning?`<div style="font-size:11px;color:var(--or);padding:7px 10px;background:rgba(245,166,35,.08);border-radius:6px;border:1px solid rgba(245,166,35,.2);">⚠ ${res.warning}</div>`:""}
  </div>`:"";
  el.innerHTML=`<div class="card ${glow}" style="height:100%;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <div style="width:36px;height:36px;border-radius:8px;flex-shrink:0;background:${a.color}15;border:1px solid ${a.color}40;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;">
        ${a.icon}
        ${st==="loading"?`<div style="position:absolute;inset:-3px;border:2px solid ${a.color};border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>`:""}
      </div>
      <div style="flex:1;min-width:0;">
        <div class="fu" style="font-size:13px;font-weight:700;color:${a.color};">${a.name}</div>
        <div style="font-size:10px;color:var(--dm);">${a.model} · ${a.desc}</div>
      </div>
      ${stLabel}
    </div>
    ${skel}${errB}${resB}
  </div>`;
}

// ─────────────────────────────────────────
// RENDER — CONSENSO
// ─────────────────────────────────────────
function renderConsensus(){
  const el=document.getElementById("cp"); if(!el)return;
  const c=S.consensus;
  const entry=S.history.find(e=>e.id===S.currentId);
  let outcomeB="";
  if(entry){
    outcomeB=entry.outcome!==null
      ?`<div style="text-align:center;margin-top:14px;"><span class="badge ${entry.correct?"bw":"bl_"}">${entry.correct?"✓ ACERTADO":"✗ FALLADO"}</span></div>`
      :`<div style="text-align:center;margin-top:14px;">
          <div class="lbl" style="margin-bottom:8px;display:block;">¿Cuál fue el resultado?</div>
          <div style="display:flex;gap:8px;justify-content:center;">
            <button class="btn bs fu" style="border-color:rgba(34,197,94,.4);color:var(--gn);background:rgba(34,197,94,.1);" onclick="setOutcome(${entry.id},'win')">✓ Acertó</button>
            <button class="btn bs fu" style="border-color:rgba(239,68,68,.4);color:var(--rd);background:rgba(239,68,68,.1);" onclick="setOutcome(${entry.id},'loss')">✗ Falló</button>
          </div>
        </div>`;
  }
  el.innerHTML=`<div class="card fu_" style="border:2px solid ${c.color}35;box-shadow:0 0 28px ${c.color}0d;">
    <div class="lbl" style="text-align:center;letter-spacing:5px;margin-bottom:18px;display:block;">── Veredicto Final ──</div>
    <div style="margin-bottom:18px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span class="lbl">Consenso</span>
        <span class="lbl" style="color:${c.color};">${c.agree}/${c.total} agentes</span>
      </div>
      ${progBar(c.str,c.color)}
    </div>
    <div style="display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;margin-bottom:16px;">
      <div style="background:${c.color}10;border:1px solid ${c.color}30;border-radius:8px;padding:12px 14px;">
        <div class="lbl" style="margin-bottom:4px;">Pick Consenso</div>
        <div class="fd" style="font-size:16px;font-weight:700;color:${c.color};">${c.pick}</div>
      </div>
      <div style="background:var(--s2);border-radius:8px;padding:12px 16px;text-align:center;">
        <div class="lbl" style="margin-bottom:3px;">Prob.</div>
        <div class="fd" style="font-size:28px;font-weight:900;">${c.avgP}<span style="font-size:13px;font-family:var(--fb);font-weight:400;">%</span></div>
      </div>
      <div style="background:var(--s2);border-radius:8px;padding:12px 16px;text-align:center;">
        <div class="lbl" style="margin-bottom:3px;">Conf.</div>
        <div class="fd" style="font-size:28px;font-weight:900;">${c.avgC}<span style="font-size:13px;font-family:var(--fb);font-weight:400;">/10</span></div>
      </div>
    </div>
    <div style="text-align:center;padding:14px;background:${c.color}10;border:1px solid ${c.color}30;border-radius:8px;">
      <div class="fd" style="font-size:22px;font-weight:900;letter-spacing:4px;color:${c.color};">${c.verdict}</div>
      <div style="font-size:11px;color:var(--dm);margin-top:4px;">${c.str===100?"Los 3 agentes coinciden":c.str>=66?"2 de 3 agentes coinciden":"Sin consenso — alto riesgo"}</div>
    </div>
    ${outcomeB}
    <div class="lbl" style="text-align:center;margin-top:14px;display:block;letter-spacing:1px;">⚠ Análisis informativo. Juega con responsabilidad.</div>
  </div>`;
}

// ─────────────────────────────────────────
// RENDER — HISTORIAL
// ─────────────────────────────────────────
function renderHistory(){
  const el=document.getElementById("tab-history"); if(!el)return;
  if(!S.history.length){
    el.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--dm);"><div style="font-size:40px;margin-bottom:12px;">📋</div><div class="fu" style="font-size:14px;">Sin análisis todavía</div></div>`;
    return;
  }
  el.innerHTML=`<div style="max-width:700px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="lbl">${S.history.length} análisis</div>
      <button class="btn bs fu" style="border-color:var(--rd);color:var(--rd);" onclick="if(confirm('¿Borrar todo?')){S.history=[];saveHist();renderHistory();renderStats();toast('🗑 Borrado');}">Borrar todo</button>
    </div>
    ${S.history.map(e=>{
      const ds=new Date(e.date).toLocaleDateString("es-CO",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
      const badge=e.outcome===null?`<span class="badge bp_">Pendiente</span>`:`<span class="badge ${e.correct?"bw":"bl_"}">${e.correct?"✓ Acertado":"✗ Fallado"}</span>`;
      return `<div class="hist-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;">
          <div>
            <div class="fu" style="font-size:14px;font-weight:700;">${e.match}</div>
            <div style="font-size:11px;color:var(--dm);margin-top:2px;">${e.sport} · ${e.market} · ${ds}</div>
          </div>
          ${badge}
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <div style="background:${e.consensus.color}12;border:1px solid ${e.consensus.color}30;border-radius:5px;padding:4px 10px;">
            <span class="fu" style="font-size:12px;font-weight:700;color:${e.consensus.color};">${e.consensus.pick}</span>
          </div>
          <span class="lbl" style="color:${e.consensus.color};">${e.consensus.verdict}</span>
          <span class="lbl">${e.consensus.avgP}% · ${e.consensus.agree}/${e.consensus.total||3}</span>
        </div>
        ${e.outcome===null?`<div style="display:flex;gap:6px;margin-top:10px;">
          <button class="btn bs fu" style="border-color:rgba(34,197,94,.4);color:var(--gn);background:rgba(34,197,94,.1);" onclick="setOutcome(${e.id},'win')">✓ Acertó</button>
          <button class="btn bs fu" style="border-color:rgba(239,68,68,.4);color:var(--rd);background:rgba(239,68,68,.1);" onclick="setOutcome(${e.id},'loss')">✗ Falló</button>
        </div>`:""}
      </div>`;
    }).join("")}
  </div>`;
}

// ─────────────────────────────────────────
// RENDER — STATS
// ─────────────────────────────────────────
function renderStats(){
  const el=document.getElementById("tab-stats"); if(!el)return;
  const res=S.history.filter(e=>e.outcome!==null);
  const wins=res.filter(e=>e.correct).length, total=res.length;
  const pct=total?Math.round((wins/total)*100):0;
  const byV={"PICK FUERTE ✅":{w:0,l:0},"PICK MODERADO ⚡":{w:0,l:0},"EVITAR ⛔":{w:0,l:0}};
  res.forEach(e=>{const v=e.consensus.verdict;if(byV[v])byV[v][e.correct?"w":"l"]++;});
  const bySp={};
  res.forEach(e=>{if(!bySp[e.sport])bySp[e.sport]={w:0,l:0};bySp[e.sport][e.correct?"w":"l"]++;});
  el.innerHTML=`<div style="max-width:700px;margin:0 auto;">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
      <div class="sb"><div class="lbl" style="margin-bottom:8px;">Total</div><div class="sn">${total}</div></div>
      <div class="sb"><div class="lbl" style="margin-bottom:8px;">Acertados</div><div class="sn" style="color:var(--gn);">${wins}</div></div>
      <div class="sb"><div class="lbl" style="margin-bottom:8px;">% Acierto</div><div class="sn" style="color:${pct>=55?"var(--gn)":pct>=45?"var(--or)":"var(--rd)"};">${pct}%</div></div>
    </div>
    ${total?`
    <div class="card" style="margin-bottom:14px;">
      <div class="lbl" style="display:block;margin-bottom:10px;">Rendimiento global</div>
      <div style="display:flex;border-radius:6px;overflow:hidden;height:18px;">
        <div style="width:${pct}%;background:var(--gn);transition:width 1s;"></div>
        <div style="flex:1;background:var(--rd);"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:5px;">
        <span style="font-size:11px;color:var(--gn);">${wins} ✓</span>
        <span style="font-size:11px;color:var(--rd);">${total-wins} ✗</span>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="lbl" style="display:block;margin-bottom:12px;">Por veredicto</div>
      ${Object.entries(byV).map(([v,d])=>{const t=d.w+d.l;const p=t?Math.round((d.w/t)*100):0;const col=v.includes("FUERTE")?"var(--gn)":v.includes("MODERADO")?"var(--or)":"var(--rd)";return t?`<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span class="fu" style="font-size:12px;font-weight:600;">${v}</span><span class="lbl">${d.w}/${t} · ${p}%</span></div>${progBar(p,col)}</div>`:""}).join("")}
    </div>
    <div class="card">
      <div class="lbl" style="display:block;margin-bottom:12px;">Por deporte</div>
      ${Object.entries(bySp).map(([sp,d])=>{const t=d.w+d.l;const p=t?Math.round((d.w/t)*100):0;return `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span class="fu" style="font-size:12px;font-weight:600;">${sp}</span><span class="lbl">${d.w}/${t} · ${p}%</span></div>${progBar(p,p>=55?"var(--gn)":p>=45?"var(--or)":"var(--rd)")}</div>`}).join("")}
    </div>`
    :`<div style="text-align:center;padding:40px 20px;color:var(--dm);"><div style="font-size:36px;margin-bottom:10px;">📊</div><div class="fu" style="font-size:13px;">Marca resultados en Historial para ver stats</div></div>`}
  </div>`;
}

// ─────────────────────────────────────────
// RENDER — CONFIG
// ─────────────────────────────────────────
function renderConfig(){
  const el=document.getElementById("tab-config"); if(!el)return;
  const fields=[
    {key:"cb_groq",  label:"Groq API Key",     hint:"console.groq.com — Gratis",               ph:"gsk_...",    req:true},
    {key:"cb_gemini",label:"Gemini API Key",   hint:"aistudio.google.com — Gratis",             ph:"AIza...",    req:false},
    {key:"cb_serp",  label:"SerpAPI Key",       hint:"serpapi.com — 100 búsquedas/mes gratis",  ph:"...",        req:false},
  ];
  const statusDot=(key)=>{
    const val=localStorage.getItem(key);
    return val?`<span style="color:var(--gn);font-size:10px;">✓ Activa</span>`:`<span style="color:var(--rd);font-size:10px;">✗ Sin key</span>`;
  };
  el.innerHTML=`<div style="max-width:600px;margin:0 auto;">
    <div class="card" style="margin-bottom:14px;">
      <div class="lbl" style="display:block;margin-bottom:4px;letter-spacing:4px;">API Keys</div>
      <div style="font-size:11px;color:var(--dm);margin-bottom:18px;line-height:1.6;">
        Guardadas solo en tu dispositivo (localStorage).<br/>
        <b style="color:var(--cy);">Groq</b> es suficiente para usar los 3 agentes.
      </div>
      ${fields.map(f=>`<div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
          <label class="fu" style="font-size:12px;font-weight:700;">${f.label} ${f.req?'<span style="color:var(--cy);font-size:9px;">REQUERIDA</span>':''}</label>
          <div style="display:flex;gap:8px;align-items:center;"><span style="font-size:10px;color:var(--dm);">${f.hint}</span>${statusDot(f.key)}</div>
        </div>
        <div style="position:relative;">
          <input type="password" id="inp-${f.key}" placeholder="${f.ph}" value="${localStorage.getItem(f.key)||""}" style="padding-right:72px;"/>
          <button class="fu" onclick="toggleVis('inp-${f.key}',this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dm);cursor:pointer;font-size:10px;font-weight:700;letter-spacing:1px;">MOSTRAR</button>
        </div>
      </div>`).join("")}
      <button class="btn bp" onclick="saveKeys()">💾 &nbsp;GUARDAR KEYS</button>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="lbl" style="display:block;margin-bottom:12px;letter-spacing:4px;">Modelos activos</div>
      ${AGENTS.map(a=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="width:32px;height:32px;border-radius:7px;background:${a.color}15;border:1px solid ${a.color}35;display:flex;align-items:center;justify-content:center;font-size:16px;">${a.icon}</div>
        <div>
          <div class="fu" style="font-size:12px;font-weight:700;color:${a.color};">${a.name}</div>
          <div style="font-size:10px;color:var(--dm);">${a.model}</div>
        </div>
      </div>`).join("")}
    </div>
    <div class="card" style="border-color:rgba(239,68,68,.25);">
      <div class="lbl" style="display:block;margin-bottom:12px;color:var(--rd);">Zona peligrosa</div>
      <button class="btn bs fu" style="border-color:rgba(239,68,68,.4);color:var(--rd);" onclick="if(confirm('¿Borrar todo? Keys + historial')){localStorage.clear();location.reload();}">🗑 Resetear todo</button>
    </div>
  </div>`;
}

function toggleVis(id,btn){
  const inp=document.getElementById(id);
  inp.type=inp.type==="password"?"text":"password";
  btn.textContent=inp.type==="password"?"MOSTRAR":"OCULTAR";
}
function saveKeys(){
  ["cb_groq","cb_gemini","cb_serp"].forEach(k=>{
    const val=document.getElementById(`inp-${k}`)?.value?.trim()||"";
    val?localStorage.setItem(k,val):localStorage.removeItem(k);
  });
  renderConfig(); toast("✅ Keys guardadas");
}

// ─────────────────────────────────────────
// TABS
// ─────────────────────────────────────────
function switchTab(id,btn){
  S.tab=id;
  document.querySelectorAll(".tb").forEach(b=>b.classList.remove("on"));
  if(btn)btn.classList.add("on");
  else document.querySelectorAll(".tb").forEach(b=>{if(b.textContent.toLowerCase().includes(id.slice(0,3)))b.classList.add("on");});
  ["analyze","history","stats","config"].forEach(t=>{
    const el=document.getElementById(`tab-${t}`);
    if(el)el.style.display=t===id?"":"none";
  });
  if(id==="analyze")renderAnalyze();
  if(id==="history")renderHistory();
  if(id==="stats")  renderStats();
  if(id==="config") renderConfig();
}

// ─────────────────────────────────────────
// PWA INSTALL
// ─────────────────────────────────────────
let deferredInstall=null;
function triggerInstall(){
  if(deferredInstall){ deferredInstall.prompt(); deferredInstall.userChoice.then(()=>{deferredInstall=null;document.getElementById("btn-install-header").style.display="none";}); }
  else{ toast("💡 En Safari: Compartir → Añadir a pantalla de inicio"); }
}
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault(); deferredInstall=e;
  const btn=document.getElementById("btn-install-header");
  if(btn)btn.style.display="inline-block";
});
window.addEventListener("appinstalled",()=>{ document.getElementById("btn-install-header").style.display="none"; toast("✅ App instalada"); });

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
document.addEventListener("DOMContentLoaded",()=>{
  renderAnalyze();
  if("serviceWorker"in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
  // Mostrar botón instalar manualmente si no hay prompt (iOS Safari)
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone;
  if(isIOS){ const btn=document.getElementById("btn-install-header"); if(btn)btn.style.display="inline-block"; }
});
</script>
</body>
</html>
