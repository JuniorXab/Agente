<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#00d4ff"/>
  <meta name="description" content="Análisis deportivo multi-agente IA"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CBetting"/>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./icon.svg"/>
  <title>Consensus Betting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0d14;--surface:#0f1520;--s2:#1a1f2e;--s3:#252d3d;--border:#1e2d40;--text:#e2e8f0;--muted:#94a3b8;--dim:#4a5568;--dimmer:#2d3748;--cyan:#00d4ff;--blue:#0080ff;--orange:#f5a623;--green:#22c55e;--red:#ef4444;--lime:#7ed321;--fd:'Barlow Condensed',sans-serif;--fu:'Rajdhani',sans-serif;--fb:'Inter',sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 60% 50% at 15% 40%,rgba(0,212,255,.04) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 85% 20%,rgba(245,166,35,.03) 0%,transparent 70%),linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:100% 100%,100% 100%,40px 40px,40px 40px;pointer-events:none;z-index:0;}
    #app{position:relative;z-index:1;}
    .fd{font-family:var(--fd);}
    .fu{font-family:var(--fu);}
    .lbl{font-family:var(--fu);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--dim);}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    @keyframes shimmer{0%,100%{opacity:.4;}50%{opacity:.9;}}
    .fade-up{animation:fadeUp .45s ease both;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
    .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
    .tab-btn{flex:1;padding:13px 4px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-family:var(--fu);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
    .tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;transition:border-color .3s;}
    .btn{font-family:var(--fu);font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;border-radius:7px;transition:opacity .2s,transform .1s;}
    .btn:active{transform:scale(.97);}
    .btn:disabled{opacity:.35;cursor:not-allowed;}
    .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#000;font-size:13px;padding:13px;width:100%;}
    .btn-sm{font-size:11px;padding:7px 16px;border:1px solid;}
    input,select{font-family:var(--fb);background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:10px 14px;font-size:14px;outline:none;transition:border-color .2s;width:100%;}
    input:focus,select:focus{border-color:var(--cyan);}
    .pill{font-family:var(--fu);font-size:11px;font-weight:600;padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;}
    .pill.ac{border-color:var(--cyan);background:rgba(0,212,255,.1);color:var(--cyan);}
    .pill.ao{border-color:var(--orange);background:rgba(245,166,35,.1);color:var(--orange);}
    .pt{background:var(--s2);border-radius:4px;height:6px;overflow:hidden;}
    .pf{height:100%;border-radius:4px;transition:width 1.1s ease;}
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--s3);color:var(--text);font-family:var(--fu);font-size:12px;padding:9px 20px;border-radius:30px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
    #toast.show{opacity:1;}
    #install-banner{display:none;position:fixed;bottom:70px;left:12px;right:12px;background:var(--surface);border:1px solid rgba(0,212,255,.3);border-radius:12px;padding:14px 16px;z-index:50;box-shadow:0 4px 30px rgba(0,0,0,.5);}
    .pc{padding:20px 14px 90px;max-width:1100px;margin:0 auto;}
    @media(max-width:600px){.ag{grid-template-columns:1fr!important;}.cm{grid-template-columns:1fr 1fr!important;}}
    /* Agent card status glow */
    .card.done-cyan  {border-color:rgba(0,212,255,.4);}
    .card.done-orange{border-color:rgba(245,166,35,.4);}
    .card.done-lime  {border-color:rgba(126,211,33,.4);}
    /* History items */
    .hist-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
    .badge{display:inline-block;font-family:var(--fu);font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:1px;}
    .badge-win {background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
    .badge-loss{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
    .badge-pend{background:rgba(245,166,35,.15);color:var(--orange);border:1px solid rgba(245,166,35,.3);}
    /* Stat boxes */
    .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
    .stat-num{font-family:var(--fd);font-size:32px;font-weight:900;line-height:1;}
  </style>
</head>
<body>
<div id="app">
  <header style="text-align:center;padding:24px 16px 14px;">
    <div class="lbl" style="color:var(--cyan);margin-bottom:5px;letter-spacing:5px;">Multi-Agent Sports Intelligence</div>
    <h1 class="fd" style="font-size:clamp(26px,6vw,48px);font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--cyan) 50%,var(--orange) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;line-height:1.05;">CONSENSUS BETTING</h1>
    <div class="lbl" style="margin-top:5px;letter-spacing:3px;">Groq · Gemini · Claude · Web Search</div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="analyze">⚡ Analizar</button>
    <button class="tab-btn" data-tab="history">📋 Historial</button>
    <button class="tab-btn" data-tab="stats">📊 Stats</button>
    <button class="tab-btn" data-tab="config">⚙️ Config</button>
  </nav>

  <div class="pc">
    <div id="tab-analyze"></div>
    <div id="tab-history" style="display:none;"></div>
    <div id="tab-stats"   style="display:none;"></div>
    <div id="tab-config"  style="display:none;"></div>
  </div>
</div>
<div id="toast"></div>
<div id="install-banner">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <div>
      <div class="fu" style="font-size:13px;font-weight:700;color:var(--cyan);">Instalar app</div>
      <div style="font-size:11px;color:var(--dim);margin-top:2px;">Acceso desde pantalla de inicio</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-sm" id="btn-install" style="border-color:var(--cyan);color:var(--cyan);">Instalar</button>
      <button class="btn btn-sm" id="btn-dismiss" style="border-color:var(--border);color:var(--dim);">Ahora no</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG — pon tus keys antes de subir
// ══════════════════════════════════════════
const CONFIG = {
  GROQ_KEY:   localStorage.getItem("cb_groq")   || "",
  GEMINI_KEY: localStorage.getItem("cb_gemini") || "",
  CLAUDE_KEY: localStorage.getItem("cb_claude") || "",
  SERP_KEY:   localStorage.getItem("cb_serp")   || "",
};

const SPORTS = [
  {id:"nba",          emoji:"🏀",label:"NBA",             markets:["Ganador partido","Over/Under total","Spread/Hándicap","Player props"]},
  {id:"pl",           emoji:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",label:"Premier League",  markets:["1X2","Ambos marcan","Total goles","Asian handicap"]},
  {id:"laliga",       emoji:"🇪🇸",label:"LaLiga",          markets:["1X2","Ambos marcan","Total goles","Asian handicap"]},
  {id:"champions",    emoji:"⭐",label:"Champions",        markets:["1X2","Ambos marcan","Total goles","Hándicap europeo"]},
  {id:"libertadores", emoji:"🌎",label:"Libertadores",     markets:["1X2","Ambos marcan","Total goles"]},
  {id:"sudamericana", emoji:"🏆",label:"Sudamericana",     markets:["1X2","Ambos marcan","Total goles"]},
  {id:"ligabetplay",  emoji:"🇨🇴",label:"Liga BetPlay",    markets:["1X2","Ambos marcan","Total goles"]},
];

const AGENTS = [
  {id:"groq",   name:"Agente Estadístico", model:"Groq / Llama-3.3-70b",      icon:"📊",color:"#00d4ff",desc:"Forma · H2H · Rendimiento"},
  {id:"gemini", name:"Agente de Mercado",  model:"Google Gemini 1.5 Flash",   icon:"💹",color:"#f5a623",desc:"Cuotas · Líneas · Valor"},
  {id:"claude", name:"Agente Contextual",  model:"Anthropic Claude Haiku",    icon:"🧠",color:"#7ed321",desc:"Lesiones · Motivación · Noticias"},
];

const SCHEMA = `{"pick":"[selección concreta]","probability":75,"confidence":8,"reasoning":"[análisis 2-3 oraciones]","key_factors":["f1","f2","f3"],"warning":"null o texto del riesgo"}`;

const SYS = {
  groq: `Eres un analista deportivo élite especializado en ESTADÍSTICAS.
Analiza SOLO: forma reciente (últimos 5-10 partidos), H2H histórico, rendimiento local/visitante, posición en tabla, promedios de goles/puntos anotados y recibidos, tendencias Over/Under.
Busca datos actualizados. Sé preciso con números reales.
REGLA: termina SIEMPRE con <answer>${SCHEMA}</answer>. JSON válido, probability y confidence son enteros.`,

  gemini: `Eres un especialista en mercados de apuestas y análisis de valor (+EV).
Analiza SOLO: cuotas actuales, probabilidad implícita (1/cuota×100), si hay valor real vs PI, movimiento de línea últimas 24-48h, señales de sharp vs public money.
Si no tienes cuotas exactas, estímalas con contexto.
REGLA: termina SIEMPRE con <answer>${SCHEMA}</answer>. JSON válido, probability y confidence son enteros.`,

  claude: `Eres un analista de inteligencia contextual deportiva.
Analiza SOLO: lesiones y dudas confirmadas, suspensiones, motivación de cada equipo (¿qué se juega?), días de descanso y fatiga, presión de afición, noticias de vestuario recientes.
Busca noticias actualizadas del partido.
REGLA: termina SIEMPRE con <answer>${SCHEMA}</answer>. JSON válido, probability y confidence son enteros.`
};

// ══════════════════════════════════════════
// SERP — búsqueda web para Groq y Gemini
// ══════════════════════════════════════════
async function serpSearch(query) {
  if (!CONFIG.SERP_KEY) return "";
  try {
    const r = await fetch(
      `https://serpapi.com/search.json?q=${encodeURIComponent(query)}&hl=es&num=5&api_key=${CONFIG.SERP_KEY}`
    );
    const d = await r.json();
    const results = (d.organic_results || []).slice(0, 5);
    return results.map(x => `• ${x.title}: ${x.snippet}`).join("\n");
  } catch { return ""; }
}

// ══════════════════════════════════════════
// AGENTE 1 — Groq (Llama-3.3-70b)
// ══════════════════════════════════════════
async function callGroq(match, sport, market) {
  const searchCtx = await serpSearch(`${match} estadísticas forma reciente ${sport}`);
  const userMsg = `Partido: ${match}\nDeporte: ${sport}\nMercado: ${market}\nFecha: ${new Date().toLocaleDateString("es-CO",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}\n\nDatos encontrados en web:\n${searchCtx || "(sin datos web, usa tu conocimiento)"}\n\nAnaliza estadísticamente y emite tu veredicto con <answer>{...}</answer>.`;

  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${CONFIG.GROQ_KEY}` },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      max_tokens: 900,
      temperature: 0.3,
      messages: [{ role: "system", content: SYS.groq }, { role: "user", content: userMsg }]
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(`Groq: ${d.error.message}`);
  return parseAgentResponse(d.choices[0].message.content);
}

// ══════════════════════════════════════════
// AGENTE 2 — Gemini 1.5 Flash
// ══════════════════════════════════════════
async function callGemini(match, sport, market) {
  const searchCtx = await serpSearch(`${match} cuotas apuestas líneas ${market}`);
  const fullPrompt = `${SYS.gemini}\n\nPartido: ${match}\nDeporte: ${sport}\nMercado: ${market}\nFecha: ${new Date().toLocaleDateString("es-CO",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}\n\nDatos de mercado encontrados:\n${searchCtx || "(sin datos web, estima con contexto)"}\n\nAnaliza el valor de mercado y emite tu veredicto con <answer>{...}</answer>.`;

  const r = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.GEMINI_KEY}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: fullPrompt }] }],
        generationConfig: { temperature: 0.3, maxOutputTokens: 900 }
      })
    }
  );
  const d = await r.json();
  if (d.error) throw new Error(`Gemini: ${d.error.message}`);
  const text = d.candidates?.[0]?.content?.parts?.[0]?.text || "";
  return parseAgentResponse(text);
}

// ══════════════════════════════════════════
// AGENTE 3 — Claude Haiku (con web search)
// ══════════════════════════════════════════
async function callClaude(match, sport, market) {
  const userMsg = `Partido: ${match}\nDeporte: ${sport}\nMercado: ${market}\nFecha: ${new Date().toLocaleDateString("es-CO",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}\n\nBusca noticias actualizadas sobre este partido. Analiza el contexto (lesiones, motivación, fatiga) y emite tu veredicto con <answer>{...}</answer>.`;

  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": CONFIG.CLAUDE_KEY, "anthropic-version": "2023-06-01" },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      system: SYS.claude,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: userMsg }]
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(`Claude: ${d.error.message}`);
  const allText = (d.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  return parseAgentResponse(allText);
}

// ══════════════════════════════════════════
// PARSER — extrae JSON de cualquier respuesta
// ══════════════════════════════════════════
function parseAgentResponse(text) {
  // Estrategia 1: tags <answer>
  const m1 = text.match(/<answer>([\s\S]*?)<\/answer>/i);
  if (m1) {
    const obj = JSON.parse(m1[1].replace(/```json|```/g,"").trim());
    if (obj.warning === "null") obj.warning = null;
    return obj;
  }
  // Estrategia 2: bloque JSON con "pick"
  const m2 = text.match(/\{[\s\S]*?"pick"[\s\S]*?\}/);
  if (m2) {
    const obj = JSON.parse(m2[0]);
    if (obj.warning === "null") obj.warning = null;
    return obj;
  }
  throw new Error(`Sin JSON válido. Respuesta: "${text.slice(0,100)}..."`);
}

// ══════════════════════════════════════════
// ESTADO GLOBAL
// ══════════════════════════════════════════
const State = {
  sport:        SPORTS[0],
  market:       SPORTS[0].markets[0],
  match:        "",
  loading:      false,
  agentStatus:  ["idle","idle","idle"],   // idle | loading | done | error
  agentResults: [null, null, null],
  agentErrors:  [null, null, null],
  consensus:    null,
  history:      JSON.parse(localStorage.getItem("cb_history") || "[]"),
  currentId:    null,
  activeTab:    "analyze",
};

function saveHistory() {
  localStorage.setItem("cb_history", JSON.stringify(State.history));
}

// ══════════════════════════════════════════
// LÓGICA PRINCIPAL — lanzar análisis
// ══════════════════════════════════════════
async function runAnalysis() {
  if (!State.match.trim() || State.loading) return;

  // Validar que haya al menos una key
  if (!CONFIG.GROQ_KEY && !CONFIG.GEMINI_KEY && !CONFIG.CLAUDE_KEY) {
    toast("⚙️ Configura al menos una API key en Config"); return;
  }

  State.loading = true;
  State.agentStatus  = ["loading","loading","loading"];
  State.agentResults = [null, null, null];
  State.agentErrors  = [null, null, null];
  State.consensus    = null;
  State.currentId    = null;
  renderAnalyze();

  const promises = AGENTS.map((agent, i) => {
    // Si no hay key para este agente, marcarlo como error
    const keys = { groq: CONFIG.GROQ_KEY, gemini: CONFIG.GEMINI_KEY, claude: CONFIG.CLAUDE_KEY };
    if (!keys[agent.id]) {
      State.agentStatus[i]  = "error";
      State.agentErrors[i]  = "Sin API key configurada";
      renderAgentCard(i);
      return Promise.resolve(null);
    }

    return callAgent(agent.id, State.match, State.sport.label, State.market)
      .then(result => {
        State.agentResults[i] = result;
        State.agentStatus[i]  = "done";
        renderAgentCard(i);
        return result;
      })
      .catch(err => {
        State.agentStatus[i] = "error";
        State.agentErrors[i] = err.message;
        renderAgentCard(i);
        return null;
      });
  });

  const results = await Promise.all(promises);
  const valid = results.filter(Boolean);

  if (valid.length >= 2) {
    State.consensus = computeConsensus(valid);
    // Guardar en historial
    const entry = {
      id:        Date.now(),
      date:      new Date().toISOString(),
      match:     State.match,
      sport:     State.sport.label,
      market:    State.market,
      consensus: State.consensus,
      results:   State.agentResults,
      outcome:   null,   // null = pendiente
    };
    State.history.unshift(entry);
    if (State.history.length > 100) State.history.pop();
    saveHistory();
    State.currentId = entry.id;
  } else {
    toast("❌ No se obtuvieron suficientes análisis");
  }

  State.loading = false;
  renderAnalyze();
}

function setOutcome(id, outcome) {
  const entry = State.history.find(e => e.id === id);
  if (!entry) return;
  entry.outcome  = outcome;
  entry.correct  = outcome === "win";
  saveHistory();
  renderAnalyze();
  renderHistory();
  renderStats();
  toast(outcome === "win" ? "✅ Marcado como acertado" : "❌ Marcado como fallado");
}

// ══════════════════════════════════════════
// HELPERS DE UI
// ══════════════════════════════════════════
function toast(msg, dur = 2800) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), dur);
}

function confBar(val, color) {
  const pct = (val / 10) * 100;
  const c = pct > 69 ? "#22c55e" : pct > 49 ? "#f5a623" : "#ef4444";
  return `<div style="background:var(--s2);border-radius:3px;height:4px;margin-top:5px;overflow:hidden;">
    <div style="height:100%;border-radius:3px;width:${pct}%;background:${c};transition:width 1s ease;"></div>
  </div>`;
}

// ══════════════════════════════════════════
// RENDER — TAB ANALIZAR
// ══════════════════════════════════════════
function renderAnalyze() {
  const el = document.getElementById("tab-analyze");
  if (!el) return;

  const sportPills = SPORTS.map(s =>
    `<button class="pill ${State.sport.id === s.id ? "ac" : ""}" onclick="setSport('${s.id}')">${s.emoji} ${s.label}</button>`
  ).join("");

  const marketPills = State.sport.markets.map(m =>
    `<button class="pill ${State.market === m ? "ao" : ""}" onclick="setMarket('${m}')">${m}</button>`
  ).join("");

  el.innerHTML = `
    <div class="card" style="max-width:700px;margin:0 auto 20px;">
      <div style="margin-bottom:14px;">
        <div class="lbl" style="margin-bottom:8px;">Deporte</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${sportPills}</div>
      </div>
      <div style="margin-bottom:14px;">
        <div class="lbl" style="margin-bottom:8px;">Mercado</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${marketPills}</div>
      </div>
      <div style="margin-bottom:16px;">
        <div class="lbl" style="margin-bottom:8px;">Partido</div>
        <input id="match-input" type="text" value="${State.match}"
          placeholder="ej: ${State.sport.id === 'nba' ? 'Lakers vs Warriors' : 'Real Madrid vs Barcelona'}"
          oninput="State.match=this.value"
          onkeydown="if(event.key==='Enter')runAnalysis()"/>
      </div>

// ══════════════════════════════════════════
// CONSENSO — calcula veredicto final
// ══════════════════════════════════════════
function computeConsensus(results) {
  const picks = results.map(r => r.pick.toLowerCase().trim());
  const probs  = results.map(r => Number(r.probability));
  const confs  = results.map(r => Number(r.confidence));

  // Agrupar picks similares (contiene misma palabra clave)
  const groups = {};
  picks.forEach((p, i) => {
    const key = picks.findIndex(q => q.includes(p.split(" ")[0]) || p.includes(q.split(" ")[0]));
    const gKey = picks[key];
    if (!groups[gKey]) groups[gKey] = [];
    groups[gKey].push(i);
  });
  const sorted = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);
  const [majorityKey, majorityIdx] = sorted[0];
  const majorityPick = results[majorityIdx[0]].pick;
  const agreementCount = majorityIdx.length;

  const avgProb = Math.round(probs.reduce((a,b)=>a+b,0) / probs.length);
  const avgConf = (confs.reduce((a,b)=>a+b,0) / confs.length).toFixed(1);
  const strength = agreementCount === 3 ? 100 : agreementCount === 2 ? 66 : 33;

  let verdict, color;
  if (strength === 100 && avgConf >= 7)      { verdict = "PICK FUERTE ✅";   color = "#22c55e"; }
  else if (strength >= 66 && avgConf >= 5.5) { verdict = "PICK MODERADO ⚡"; color = "#f5a623"; }
  else                                        { verdict = "EVITAR ⛔";        color = "#ef4444"; }

  return { majorityPick, avgProb, avgConf: Number(avgConf), strength, agreementCount, verdict, color };
}

        <div style="display:flex;border-radius:6px;overflow:hidden;height:18px;">
          <div style="width:${pct}%;background:var(--green);transition:width 1s ease;"></div>
          <div style="flex:1;background:var(--red);"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:5px;">
          <span style="font-size:11px;color:var(--green);">${wins} acertados</span>
          <span style="font-size:11px;color:var(--red);">${total-wins} fallados</span>
        </div>
      </div>

      <!-- Por tipo de veredicto -->
      <div class="card" style="margin-bottom:16px;">
        <div class="lbl" style="margin-bottom:12px;display:block;">Por tipo de veredicto</div>
        ${Object.entries(byVerdict).map(([v,d])=>{
          const t = d.w+d.l;
          const p = t ? Math.round((d.w/t)*100) : 0;
          const col = v.includes("FUERTE")?"var(--green)":v.includes("MODERADO")?"var(--orange)":"var(--red)";
          return t ? `
            <div style="margin-bottom:12px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                <span class="fu" style="font-size:12px;font-weight:600;">${v}</span>
                <span class="lbl">${d.w}/${t} · ${p}%</span>
              </div>
              ${progressBar(p, col)}
            </div>` : "";
        }).join("")}
      </div>

      <!-- Por deporte -->
      <div class="card">
        <div class="lbl" style="margin-bottom:12px;display:block;">Por deporte</div>
        ${Object.entries(bySport).map(([sport, d])=>{
          const t = d.w+d.l;
          const p = t ? Math.round((d.w/t)*100) : 0;
          return `
            <div style="margin-bottom:12px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                <span class="fu" style="font-size:12px;font-weight:600;">${sport}</span>
                <span class="lbl">${d.w}/${t} · ${p}%</span>
              </div>
              ${progressBar(p, p>=55?"var(--green)":p>=45?"var(--orange)":"var(--red)")}
            </div>`;
        }).join("")}
      </div>` : `
      <div style="text-align:center;padding:40px 20px;color:var(--dim);">
        <div style="font-size:36px;margin-bottom:10px;">📊</div>
        <div class="fu" style="font-size:13px;">Sin datos suficientes</div>
        <div style="font-size:11px;margin-top:4px;">Marca resultados en el historial</div>
      </div>`}
    </div>`;
}

// ══════════════════════════════════════════
// RENDER — TAB CONFIG
// ══════════════════════════════════════════
function renderConfig() {
  const el = document.getElementById("tab-config");
  if (!el) return;

  const fields = [
    { key:"cb_groq",   label:"Groq API Key",       hint:"console.groq.com — Gratis",           ph:"gsk_..." },
    { key:"cb_gemini", label:"Google Gemini Key",   hint:"aistudio.google.com — Gratis",        ph:"AIza..." },
    { key:"cb_claude", label:"Anthropic Claude Key",hint:"console.anthropic.com — De pago",     ph:"sk-ant-..." },
    { key:"cb_serp",   label:"SerpAPI Key",         hint:"serpapi.com — 100 búsquedas/mes gratis", ph:"..." },
  ];

  el.innerHTML = `
    <div style="max-width:600px;margin:0 auto;">
      <div class="card" style="margin-bottom:16px;">
        <div class="lbl" style="display:block;margin-bottom:4px;letter-spacing:4px;">API Keys</div>
        <div style="font-size:11px;color:var(--dim);margin-bottom:18px;line-height:1.6;">
          Las keys se guardan solo en tu dispositivo (localStorage).<br/>
          Nunca se envían a ningún servidor externo excepto a la API correspondiente.
        </div>
        ${fields.map(f => `
          <div style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
              <label class="fu" style="font-size:12px;font-weight:700;">${f.label}</label>
              <span style="font-size:10px;color:var(--dim);">${f.hint}</span>
            </div>
            <div style="position:relative;">
              <input type="password" id="inp-${f.key}" placeholder="${f.ph}"
                value="${localStorage.getItem(f.key)||""}"
                style="padding-right:70px;"/>
              <button class="fu" onclick="toggleVisible('inp-${f.key}',this)"
                style="position:absolute;right:8px;top:50%;transform:translateY(-50%);
                  background:none;border:none;color:var(--dim);cursor:pointer;font-size:10px;font-weight:700;">
                MOSTRAR
              </button>
            </div>
          </div>`).join("")}
        <button class="btn btn-primary" onclick="saveKeys()" style="margin-top:4px;">
          💾 &nbsp;GUARDAR KEYS
        </button>
      </div>

      <!-- Info de modelos -->
      <div class="card" style="margin-bottom:16px;">
        <div class="lbl" style="display:block;margin-bottom:14px;letter-spacing:4px;">Modelos activos</div>
        ${AGENTS.map(a=>`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
            <div style="width:32px;height:32px;border-radius:7px;background:${a.color}15;border:1px solid ${a.color}35;
              display:flex;align-items:center;justify-content:center;font-size:16px;">${a.icon}</div>
            <div>
              <div class="fu" style="font-size:12px;font-weight:700;color:${a.color};">${a.name}</div>
              <div style="font-size:10px;color:var(--dim);">${a.model}</div>
            </div>
            <div style="margin-left:auto;">
              <span class="lbl" style="color:${CONFIG[a.id.toUpperCase()+"_KEY"]||localStorage.getItem("cb_"+a.id)?"var(--green)":"var(--red)"};">
                ${CONFIG[a.id.toUpperCase()+"_KEY"]||localStorage.getItem("cb_"+a.id)?"✓ Activo":"✗ Sin key"}
              </span>
            </div>
          </div>`).join("")}
      </div>

      <!-- Peligro -->
      <div class="card" style="border-color:rgba(239,68,68,.25);">
        <div class="lbl" style="display:block;margin-bottom:12px;color:var(--red);letter-spacing:3px;">Zona peligrosa</div>
        <button class="btn btn-sm fu" style="border-color:rgba(239,68,68,.4);color:var(--red);"
          onclick="if(confirm('¿Borrar TODO? Keys + historial')){localStorage.clear();location.reload();}">
          🗑 Borrar todo y resetear
        </button>
      </div>
    </div>`;
}

function toggleVisible(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === "password") { inp.type = "text";     btn.textContent = "OCULTAR"; }
  else                         { inp.type = "password"; btn.textContent = "MOSTRAR"; }
}

function saveKeys() {
  const map = { "cb_groq":"GROQ_KEY", "cb_gemini":"GEMINI_KEY", "cb_claude":"CLAUDE_KEY", "cb_serp":"SERP_KEY" };
  Object.entries(map).forEach(([lsKey, cfgKey]) => {
    const val = document.getElementById(`inp-${lsKey}`)?.value?.trim() || "";
    if (val) { localStorage.setItem(lsKey, val); CONFIG[cfgKey] = val; }
    else     { localStorage.removeItem(lsKey);   CONFIG[cfgKey] = ""; }
  });
  renderConfig();
  toast("✅ Keys guardadas");
}

// ══════════════════════════════════════════
// NAVEGACIÓN DE TABS
// ══════════════════════════════════════════
function switchTab(tabId) {
  State.activeTab = tabId;
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === tabId);
  });
  ["analyze","history","stats","config"].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    if (el) el.style.display = t === tabId ? "" : "none";
  });
  if (tabId === "analyze") renderAnalyze();
  if (tabId === "history") renderHistory();
  if (tabId === "stats")   renderStats();
  if (tabId === "config")  renderConfig();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  // Tabs
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
  });

  // Render inicial
  renderAnalyze();

  // PWA — install prompt
  let deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById("install-banner");
    if (banner) banner.style.display = "block";
  });

  document.getElementById("btn-install")?.addEventListener("click", () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById("install-banner").style.display = "none";
    });
  });

  document.getElementById("btn-dismiss")?.addEventListener("click", () => {
    document.getElementById("install-banner").style.display = "none";
  });

  // Service Worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("SW registrado ✓"))
      .catch(e => console.warn("SW error:", e));
  }
});
</script>
</body>
</html>
